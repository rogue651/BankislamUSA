<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Transfer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="screen transfer">

  <!-- ===== Header ===== -->
  <div class="tf-header">
    <table class="tf-bar">
      <tr>
        <td style="width:15%">
          <a href="home.html">
            <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </a>
        </td>
        <td class="tf-title" style="width:70%">Transfer</td>
        <td style="width:15%"></td>
      </tr>
    </table>
  </div>

  <!-- ===== Body ===== -->
  <div class="tf-body">

    <div class="tf-to-card">
      <div class="tf-to-lbl">TRANSFER TO</div>
      <div class="tf-to-name">VICTOR NNAMANI</div>
      <div class="tf-to-sub">CIMB Bank Berhad &middot; 7070711014</div>
    </div>

    <div class="tf-amt-label">Enter Amount</div>
    <div class="tf-amt-box">
      <span class="rm">RM</span><input id="amt" type="text" inputmode="decimal" placeholder="0.00" autocomplete="off">
    </div>

    <div class="tf-note-label">Reference (optional)</div>
    <input id="note" class="tf-note" type="text" placeholder="What's it for?" autocomplete="off">

    <div id="err" class="tf-err"></div>

    <button id="sendBtn" class="tf-send">Send</button>
  </div>

  <!-- ===== Hurray overlay ===== -->
  <div id="hurray" class="hurray">
    <div class="hurray-inner">
      <div class="party">&#127881;</div>
      <div class="h-check">
        <svg class="ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="h-title">Hurray!</div>
      <div class="h-amt" id="hAmt">RM 0.00</div>
      <div class="h-sub">sent to Victor Nnamani</div>
      <button class="h-done" id="doneBtn">Done</button>
    </div>
  </div>

</div>

<script>
/* Plain ES5 - type any amount, Send -> Hurray. */
(function () {
  var amt     = document.getElementById('amt');
  var err     = document.getElementById('err');
  var sendBtn = document.getElementById('sendBtn');
  var hurray  = document.getElementById('hurray');
  var hAmt    = document.getElementById('hAmt');
  var doneBtn = document.getElementById('doneBtn');

  function fmt(n) {
    /* format 1234.5 -> 1,234.50 */
    var parts = n.toFixed(2).split('.');
    var whole = parts[0];
    var out = '';
    var c = 0;
    for (var k = whole.length - 1; k >= 0; k--) {
      out = whole.charAt(k) + out;
      c++;
      if (c % 3 === 0 && k > 0) { out = ',' + out; }
    }
    return out + '.' + parts[1];
  }

  sendBtn.onclick = function () {
    var raw = amt.value.replace(/,/g, '').replace(/[^0-9.]/g, '');
    var val = parseFloat(raw);
    if (!raw || isNaN(val) || val <= 0) {
      err.innerHTML = 'Please enter an amount to send.';
      return;
    }
    err.innerHTML = '';
    hAmt.innerHTML = 'RM ' + fmt(val);
    hurray.className = 'hurray show';
  };

  doneBtn.onclick = function () {
    hurray.className = 'hurray';
    amt.value = '';
    document.getElementById('note').value = '';
  };
})();
</script>
</body>
</html>
